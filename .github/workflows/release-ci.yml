name: release-ci

# Post-merge validation gate. Runs on push to protected branches
# (main, develop) and as the canonical scheduled run. Always uses the
# FULL pytest matrix — no conditional skipping — so the protected-branch
# history is exercised on every supported Python.
#
# L1 concurrency — coalesce overlapping pushes on the same branch.
# L5a uv-managed Python (`uv python install` + `uv venv --python`) so each
#     matrix leg pins its interpreter independently of the runner.
# L5b .venv/bin on PATH so console scripts resolve without `uv run`.
#
# PILOT: org-level reusable-workflow migration (scitex-ai/.github,
# 2026-07-10). `tests` and `import-smoke` below are now thin callers into
# scitex-ai/.github reusable workflows (same job bodies, centrally
# maintained). `audit` is LEFT AS-IS: this repo's audit job passes
# `--no-version-check` and installs the `scitex-dev[cli-audit]` extra,
# which the reusable quality-audit.yml does not support — a real
# behavioral deviation, not a clean mechanical match, so it stays local
# per the migration brief ("do not force a mismatch").
#
# NOTE: this file fires on `push`/`schedule`, NOT `pull_request` — the
# required-status-check contexts that gate PR merges into develop/main
# ("pytest-matrix-on-ubuntu-py3.11/12/13") are produced by pr-ci.yml's
# own `tests` job (left untouched, see pr-ci.yml), so converting the
# jobs below does not change what branch protection needs to require.
#
# New required-status-check context for the converted jobs (post-merge
# only, not currently in branch-protection's required list):
#   pytest-matrix / pytest-matrix-on-ubuntu-py3.11 (and .12, .13)
#   import-smoke / import-smoke-on-ubuntu-py3-12

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pytest-matrix:
    # New required-status-check context: "pytest-matrix / pytest-matrix-on-ubuntu-py<X.YY>"
    uses: scitex-ai/.github/.github/workflows/pytest-matrix.yml@main
    secrets: inherit

  import-smoke:
    # New required-status-check context: "import-smoke / import-smoke-on-ubuntu-py3-12"
    uses: scitex-ai/.github/.github/workflows/import-smoke.yml@main
    secrets: inherit

  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python 3.12 (uv-managed)
        run: uv python install 3.12
      - name: Install package + audit tooling
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python -e ".[dev]"
          uv pip install --python .venv/bin/python "scitex-dev[cli-audit]"
      - name: Run scitex-dev ecosystem audit-all
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          scitex-dev ecosystem audit-all scitex-clew --no-version-check
